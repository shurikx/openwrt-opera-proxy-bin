name: Build Opera Proxy APK (v25)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: "mipsle"
            goarch: "mipsle"
            gomips: "softfloat"
            pkg_arch: "mipsel_24kc"
            sdk_url: "https://downloads.openwrt.org/releases/25.12.0/targets/ramips/mt7621/openwrt-sdk-25.12.0-ramips-mt7621_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          - arch: "arm64"
            goarch: "arm64"
            gomips: ""
            pkg_arch: "aarch64_cortex-a53"
            sdk_url: "https://downloads.openwrt.org/releases/25.12.0/targets/mediatek/filogic/openwrt-sdk-25.12.0-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64.tar.zst"

    steps:
      - uses: actions/checkout@v4

      # 1. Собираем сам бинарник из исходников (Go)
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Compile Opera Proxy Binary
        run: |
          git clone https://github.com/Snawoot/opera-proxy.git source
          cd source
          GOOS=linux GOARCH=${{ matrix.goarch }} GOMIPS=${{ matrix.gomips }} go build -ldflags="-s -w" -o ../opera-proxy-bin
          cd ..

      # 2. Готовим SDK OpenWrt
      - name: Install dependencies
        run: sudo apt update && sudo apt install -y zstd libncurses5-dev

      - name: Setup SDK
        run: |
          wget -O sdk.tar.zst ${{ matrix.sdk_url }}
          mkdir sdk
          tar --use-compress-program=unzstd -xf sdk.tar.zst -C sdk --strip-components=1

      # 3. Собираем APK
      - name: Prepare Package
        run: |
          # Копируем структуру твоего пакета
          cp -r opera-proxy sdk/package/
          # Создаем папку и кладем туда наш скомпилированный бинарник
          mkdir -p sdk/package/opera-proxy/files/usr/bin
          cp opera-proxy-bin sdk/package/opera-proxy/files/usr/bin/opera-proxy
          chmod +x sdk/package/opera-proxy/files/usr/bin/opera-proxy
          
          # Обновляем версию в Makefile (берем из Go модуля)
          VER=$(curl -s https://api.github.com/repos/Snawoot/opera-proxy/tags | grep '"name":' | head -n 1 | sed -E 's/.*"v([^"]+)".*/\1/')
          sed -i "s/^PKG_VERSION:=.*$/PKG_VERSION:=${VER}/" sdk/package/opera-proxy/Makefile

      - name: Compile APK
        run: |
          cd sdk
          ./scripts/feeds update base
          ./scripts/feeds install -a
          echo "CONFIG_PACKAGE_opera-proxy=y" > .config
          make defconfig
          make package/opera-proxy/compile V=s IGNORE_ERRORS=m

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opera-proxy-${{ matrix.arch }}
          path: sdk/bin/packages/**/opera-proxy_*.apk

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}"
          name: "Opera Proxy Build ${{ github.run_number }}"
          files: artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
